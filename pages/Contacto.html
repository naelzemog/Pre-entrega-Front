<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contacto | TechStore</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/styles.css">
    </head>
    <body>
        <header>
            <div class="div-logo"><a class="logo" href="../index.html">Logo</a></div>
            <nav class="header-nav">
                <ul class="nav-links">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="./contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1 class="titulo-contacto text-secondary">Contactanos</h1>

            <form class="form-contacto" action="" method="POST">
                <div class="grupo-input">
                    <label for="email">Your email:</label>
                    <input id="email" type="email" name="email">
                </div>
                <div class="grupo-input">
                    <label for="mensaje">Your message:</label>
                    <textarea id="mensaje" name="message"></textarea>
                </div>
                <button class="btn bg-secondary text-dark" type="submit">Send</button>
            </form>
    </main>

    <footer>
        <p>Sitio realizado por Leandro para TalentoTech</p>
        <nav>
            <ul class="footer-list">
            <li><img src="../img/Whatsapp.png" alt="logo de whatsapp" /></li>
            <li><img src="../img/Instagram.png" alt="logo de Instagram" /></li>
            </ul>
        </nav>
    </footer>
</body>
</html>
